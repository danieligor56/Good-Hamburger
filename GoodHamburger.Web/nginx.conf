# Define zona de limite de requisições por IP
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Timeouts contra ataques Slowloris
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Cabeçalhos de Segurança (OWASP)
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:5000;" always;

    location / {
        # Aplica o limite de requisições (até 10 por segundo, com burst de 20)
        limit_req zone=mylimit burst=20 nodelay;

        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Configuração de cache para arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
        limit_req zone=mylimit burst=30;
    }

    # Erros customizados para rate limit
    error_page 429 /error_429.html;
}
